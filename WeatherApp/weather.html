<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weather App</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="weather.css">
</head>

<body class="bg-primary bg-gradient text-white">

<div class="container text-center py-5">

  <h1 class="mb-4">🌤 Weather App</h1>

  <!-- Controls -->
  <div class="row justify-content-center mb-3">
    <div class="col-md-4">
      <select id="city-select" class="form-select">
        <option value=""></option>
        <option value="new york">New York</option>
        <option value="los angeles">Los Angeles</option>
        <option value="chicago">Chicago</option>
        <option value="paris">Paris</option>
        <option value="tokyo">Tokyo</option>
        <option value="london">London</option>
      </select>
    </div>
  </div>

  <button id="get-weather-btn" class="btn btn-light mb-4">
    Get Weather
  </button>

  <!-- Weather Card -->
  <div id="weather-card" class="card text-dark mx-auto weather-card">
    <div class="card-body">

      <h3 id="location"></h3>

      <img id="weather-icon" class="weather-icon" src="" alt="icon">

      <h5 id="weather-main"></h5>

      <p id="main-temperature"></p>
      <p id="feels-like"></p>
      <p id="humidity"></p>
      <p id="wind"></p>
      <p id="wind-gust"></p>

    </div>
  </div>

</div>

<script src="weather.js"></script>
</body>
</html>
